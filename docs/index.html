<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>股票分析報告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0C10;--bg2:#111318;--bg3:#181B22;--bg4:#1E2229;
  --border:#2A2D35;--border2:#353840;
  --text:#E8EAF0;--text2:#9499A8;--text3:#636878;
  --green:#34C77B;--red:#FF5F6D;--yellow:#F0B429;
  --blue:#5B9CF6;--purple:#8B5CF6;--teal:#2DD4BF;
  --green-dim:#1A3D2B;--red-dim:#3D1A1C;--yellow-dim:#3D2F0A;
  --blue-dim:#1A2B3D;
  --font:'Noto Sans TC',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:0 20px 20px;border-bottom:1px solid var(--border)}
.logo-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.02em}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.sidebar-section{padding:16px 20px 8px;font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.filter-group{padding:0 12px 8px}
select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--radius);font-size:13px;font-family:var(--font);cursor:pointer;outline:none}
select:focus{border-color:var(--blue)}
.stat-cards{padding:12px 12px 0;display:grid;gap:8px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.stat-val{font-size:22px;font-weight:700;font-family:var(--mono)}
.stat-val.green{color:var(--green)}
.stat-val.yellow{color:var(--yellow)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.updated{padding:16px 20px 0;font-size:11px;color:var(--text3);font-family:var(--mono)}

/* Main */
.main{padding:24px;overflow-y:auto}
.page-header{margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2)}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:16px}
.date-group-label{grid-column:1/-1;font-size:12px;font-weight:500;color:var(--text3);padding:8px 0 4px;border-bottom:1px solid var(--border);letter-spacing:.04em}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:border-color .15s,transform .1s;position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.has-signal{border-left:3px solid var(--red)}
.card.has-signal:hover{border-color:var(--red)}
.card.normal{border-left:3px solid var(--border)}
.card-type-badge{position:absolute;top:12px;right:12px;font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-weight:500}
.badge-daily{background:var(--blue-dim);color:var(--blue)}
.badge-morning{background:var(--yellow-dim);color:var(--yellow)}
.badge-us{background:var(--green-dim);color:var(--green)}
.badge-backtest{background:#2D1A3D;color:var(--purple)}
.badge-weekly{background:#1A2D2A;color:var(--teal)}
.card-date{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:6px}
.card-title{font-size:14px;font-weight:500;margin-bottom:8px;padding-right:60px}
.card-market{font-size:12px;color:var(--text2);margin-bottom:8px}
.signals{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.sig-tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--red-dim);color:var(--red);font-weight:500}
.sig-tag.info{background:var(--blue-dim);color:var(--blue)}
.vix-tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500;font-family:var(--mono)}
.vix-high{background:var(--red-dim);color:var(--red)}
.vix-mid{background:var(--yellow-dim);color:var(--yellow)}
.vix-low{background:var(--green-dim);color:var(--green)}
.card-footer{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2)}

/* Detail panel */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;backdrop-filter:blur(4px)}
.detail-overlay.open{display:flex;align-items:stretch;justify-content:flex-end}
.detail-drawer{width:min(680px,100vw);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.drawer-title{font-size:16px;font-weight:600}
.drawer-meta{font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.close-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:var(--font)}
.close-btn:hover{background:var(--bg4)}
.drawer-content{padding:20px 24px;overflow-y:auto;flex:1}
.report-text{font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--text2);white-space:pre-wrap;word-break:break-all}
.report-text .line-signal{color:var(--green);font-weight:500}
.report-text .line-warn{color:var(--red)}
.report-text .line-header{color:var(--yellow);font-weight:500}
.report-text .line-buy{color:var(--blue)}

/* Empty */
.empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Mobile */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:12px}
  .logo{padding:0 12px 12px;border-bottom:none;width:100%}
  .sidebar-section{display:none}
  .filter-group{padding:0 6px 8px;flex:1;min-width:140px}
  .stat-cards{display:none}
  .updated{display:none}
  .main{padding:16px}
  .detail-drawer{width:100vw}
}
</style>
</head>

const TYPE_BADGE = {
  daily:'badge-daily',morning:'badge-morning',
  us:'badge-us',backtest:'badge-backtest',weekly:'badge-weekly'
};
const TYPE_NAME = {
  daily:'每日收盤',morning:'早盤確認',
  us:'美股觀察',backtest:'回測分析',weekly:'週篩選'
};

function vixClass(v){
  if(!v) return '';
  if(v>=30) return 'vix-high';
  if(v>=20) return 'vix-mid';
  return 'vix-low';
}

function applyFilters(){
  const type   = document.getElementById('typeFilter').value;
  const date   = document.getElementById('dateFilter').value;
  const signal = document.getElementById('signalFilter').value;
  const grid   = document.getElementById('cardsGrid');

  let filtered = REPORTS.filter(r=>{
    if(type!=='all' && r.type!==type) return false;
    if(date && r.date!==date) return false;
    if(signal==='signal' && r.signals.length===0) return false;
    if(signal==='nosignal' && r.signals.length>0) return false;
    return true;
  });

  document.getElementById('resultCount').textContent = `共 ${filtered.length} 份報告`;

  if(filtered.length===0){
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">沒有符合條件的報告</div></div>`;
    return;
  }

  let html = '';
  let lastDate = '';

  for(const r of filtered){
    if(r.date!==lastDate){
      html += `<div class="date-group-label">${r.date}</div>`;
      lastDate = r.date;
    }
    const hasSig = r.signals.length>0;
    const sigHtml = r.signals.map(s=>`<span class="sig-tag">${s}</span>`).join('');
    const vixHtml = r.vix ? `<span class="vix-tag ${vixClass(r.vix)}">VIX ${r.vix}</span>` : '';
    const marketHtml = r.market ? `<div class="card-market">${r.market}</div>` : '';

    html += `<div class="card ${hasSig?'has-signal':'normal'}" onclick="openDetail('${r.filename}')">
      <span class="card-type-badge ${TYPE_BADGE[r.type]||''}">${TYPE_NAME[r.type]||r.type}</span>
      <div class="card-date">${r.date}</div>
      <div class="card-title">${r.name}</div>
      ${marketHtml}
      <div class="signals">${sigHtml}${vixHtml}</div>
      <div class="card-footer">
        <div class="dot" style="background:${hasSig?'var(--red)':'var(--border2)'}"></div>
        ${hasSig?`${r.signals.length} 個訊號`:'無明顯訊號'}
        &nbsp;·&nbsp; ${r.filename}
      </div>
    </div>`;
  }
  grid.innerHTML = html;
}

function openDetail(fname){
  const r = REPORTS.find(x=>x.filename===fname);
  if(!r) return;
  document.getElementById('drawerTitle').textContent = r.name;
  document.getElementById('drawerMeta').textContent  = r.date + '  ·  ' + r.filename;

  const lines = r.content.split('\n').map(line=>{
    const esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(/【.*】/.test(line)) return `<span class="line-header">${esc}</span>`;
    if(/✅|🟢|📈/.test(line))  return `<span class="line-signal">${esc}</span>`;
    if(/🔴|❌|🚨|⚠️/.test(line)) return `<span class="line-warn">${esc}</span>`;
    if(/💡|📌|建議/.test(line))  return `<span class="line-buy">${esc}</span>`;
    return esc;
  });
  document.getElementById('drawerContent').innerHTML = lines.join('\n');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeDetail(e){
  if(e.target===document.getElementById('overlay')) closeDrawer();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeDrawer();
});

applyFilters();
</script>
